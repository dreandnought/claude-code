name: Cross Compile

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target platform'
        required: true
        default: 'linux-arm64'
        type: choice
        options:
          - linux-x64
          - linux-arm64
          - macos-x64
          - macos-arm64
          - windows-x64

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-latest
          - target: macos-x64
            runner: macos-latest
          - target: macos-arm64
            runner: macos-latest
          - target: windows-x64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          bun run build
          # For cross-compilation, download target platform's bun and use it
          BUN_VERSION=$(bun --version)
          BUN_PLATFORM="${{ matrix.target }}"
          curl -sL "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-${BUN_PLATFORM}.zip" -o /tmp/bun-${BUN_PLATFORM}.zip
          unzip -j /tmp/bun-${BUN_PLATFORM}.zip "bun-${BUN_PLATFORM}/bun" -d /tmp/bun-target
          chmod +x /tmp/bun-target/bun
          bun build dist/cli.js --compile --compile-executable-path=/tmp/bun-target/bun --outfile=claude-code

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-${{ matrix.target }}
          path: claude-code
