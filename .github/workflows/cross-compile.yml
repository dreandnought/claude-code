name: Cross Compile

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target platform'
        required: true
        default: 'linux-arm64'
        type: choice
        options:
          - linux-x64
          - linux-arm64
          - macos-x64
          - macos-arm64
          - windows-x64

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-latest
          - target: macos-x64
            runner: macos-latest
          - target: macos-arm64
            runner: macos-latest
          - target: windows-x64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          bun run build
          bun build dist/cli.js --compile --target=${{ matrix.target }} --outfile=claude-code-${{ matrix.target }}
        env:
          TARGET_PLATFORM: ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-${{ matrix.target }}
          path: claude-code-${{ matrix.target }}

  release:
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
